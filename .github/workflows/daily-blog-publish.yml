name: Daily Blog Auto-Publish

on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 UTC+8 (Taiwan time)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q Pillow

      - name: Check for drafts
        id: check
        run: |
          DRAFT=$(ls blog/drafts/*.html 2>/dev/null | sort | head -1)
          if [ -z "$DRAFT" ]; then
            echo "No drafts available"
            echo "has_draft=false" >> $GITHUB_OUTPUT
          else
            FILENAME=$(basename "$DRAFT")
            echo "draft_path=$DRAFT" >> $GITHUB_OUTPUT
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
            echo "has_draft=true" >> $GITHUB_OUTPUT
            echo "Publishing: $FILENAME"
          fi

      - name: Move draft to posts
        if: steps.check.outputs.has_draft == 'true'
        run: |
          mv "${{ steps.check.outputs.draft_path }}" "blog/posts/${{ steps.check.outputs.filename }}"

      - name: Update blog index
        if: steps.check.outputs.has_draft == 'true'
        run: |
          python3 << 'PYEOF'
          import re, sys

          filename = "${{ steps.check.outputs.filename }}"
          filepath = f"blog/posts/{filename}"
          today = __import__('datetime').date.today().isoformat()

          with open(filepath, 'r', encoding='utf-8') as f:
              html = f.read()

          title_zh = re.search(r'<h1[^>]*>([^<]+)', html)
          title_zh = title_zh.group(1) if title_zh else filename
          title_en = ""
          t_match = re.search(r'<h1[^>]*data-en="([^"]*)"', html)
          if t_match:
              title_en = t_match.group(1)

          desc_match = re.search(r'name="description" content="([^"]*)"', html)
          desc = desc_match.group(1)[:150] if desc_match else ""

          cat_match = re.search(r'<span class="category"[^>]*>([^<]+)', html)
          cat_zh = cat_match.group(1) if cat_match else "Blog"
          cat_en_match = re.search(r'<span class="category"[^>]*data-en="([^"]*)"', html)
          cat_en = cat_en_match.group(1) if cat_en_match else cat_zh

          # Extract first base64 image and resize for thumbnail
          import base64 as b64, io
          img_match = re.search(r'src="(data:image/jpeg;base64,[A-Za-z0-9+/=]+)"', html)
          thumb_src = ""
          if img_match:
              try:
                  from PIL import Image
                  full_b64 = img_match.group(1).split(',')[1]
                  img = Image.open(io.BytesIO(b64.b64decode(full_b64))).convert('RGB')
                  img = img.resize((400, 250), Image.LANCZOS)
                  buf = io.BytesIO()
                  img.save(buf, 'JPEG', quality=65)
                  thumb_src = 'data:image/jpeg;base64,' + b64.b64encode(buf.getvalue()).decode()
              except ImportError:
                  thumb_src = img_match.group(1)[:2000]

          thumb_html = ""
          if thumb_src:
              thumb_html = f'<div class="post-card-thumb" style="padding:0;font-size:0"><img src="{thumb_src}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:12px"></div>'
          else:
              thumb_html = '<div class="post-card-thumb">📝</div>'

          card = f'''    <a href="posts/{filename}" class="post-card">
                <div class="post-card-content">
                  <div class="post-card-meta">
                    <span class="post-card-category"><span data-zh="{cat_zh}" data-en="{cat_en}">{cat_zh}</span></span>
                    <span>{today}</span>
                    <span data-zh="6 分鐘閱讀" data-en="6 min read">6 分鐘閱讀</span>
                  </div>
                  <h2><span data-zh="{title_zh}" data-en="{title_en or title_zh}">{title_zh}</span></h2>
                  <p><span data-zh="{desc[:150]}" data-en="{desc[:150]}">{desc[:150]}</span></p>
                </div>
                {thumb_html}
              </a>
          '''

          with open('blog/index.html', 'r', encoding='utf-8') as f:
              index = f.read()

          # Insert before </section> in post-grid
          insert_point = index.find('</section>', index.find('post-grid'))
          if insert_point > 0:
              # Find the </div> before </section>
              div_point = index.rfind('</div>', 0, insert_point)
              if div_point > 0:
                  index = index[:div_point] + card + '\n' + index[div_point:]

          with open('blog/index.html', 'w', encoding='utf-8') as f:
              f.write(index)

          print(f"Added card for {filename}")
          PYEOF

      - name: Update sitemap
        if: steps.check.outputs.has_draft == 'true'
        run: |
          FILENAME="${{ steps.check.outputs.filename }}"
          URL="https://hiboss.demosilvermoon.com.tw/blog/posts/${FILENAME}"
          sed -i "/<\/urlset>/i\\  <url><loc>${URL}</loc><priority>0.9</priority><changefreq>weekly</changefreq></url>" sitemap.xml

      - name: Update RSS
        if: steps.check.outputs.has_draft == 'true'
        run: |
          FILE="blog/posts/${{ steps.check.outputs.filename }}"
          FILENAME="${{ steps.check.outputs.filename }}"
          TITLE=$(grep -oP '<h1>\K[^<]+' "$FILE" | head -1)
          DESC=$(grep -oP 'name="description" content="\K[^"]+' "$FILE" | head -1)
          CATEGORY=$(grep -oP '<span class="category">\K[^<]+' "$FILE" | head -1)
          DATE=$(date -R)
          URL="https://hiboss.demosilvermoon.com.tw/blog/posts/${FILENAME}"

          ITEM="  <item>\n    <title>${TITLE}</title>\n    <link>${URL}</link>\n    <description>${DESC:0:200}</description>\n    <category>${CATEGORY}</category>\n    <pubDate>${DATE}</pubDate>\n    <guid>${URL}</guid>\n  </item>\n"

          sed -i "/<\/channel>/i\\${ITEM}" blog/rss.xml

      - name: Update article date to today
        if: steps.check.outputs.has_draft == 'true'
        run: |
          FILE="blog/posts/${{ steps.check.outputs.filename }}"
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/\"datePublished\": \"[0-9-]*\"/\"datePublished\": \"${TODAY}\"/" "$FILE"
          sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"${TODAY}\"/" "$FILE"

      - name: Commit and push
        if: steps.check.outputs.has_draft == 'true'
        run: |
          git config user.name "HEY!BOSS Blog Bot"
          git config user.email "blog-bot@hiboss.demosilvermoon.com.tw"
          git add -A
          git commit -m "Blog: publish ${{ steps.check.outputs.filename }}"
          git push

      - name: Notify Google Indexing API
        if: steps.check.outputs.has_draft == 'true'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "$GCP_SA_KEY" > /tmp/sa.json
            pip install -q google-auth google-api-python-client
            python3 -c "
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          creds = service_account.Credentials.from_service_account_file('/tmp/sa.json', scopes=['https://www.googleapis.com/auth/indexing'])
          svc = build('indexing', 'v3', credentials=creds)
          url = 'https://hiboss.demosilvermoon.com.tw/blog/posts/${{ steps.check.outputs.filename }}'
          svc.urlNotifications().publish(body={'url': url, 'type': 'URL_UPDATED'}).execute()
          print(f'Indexed: {url}')
          "
            rm /tmp/sa.json
          fi

      - name: Notify Telegram
        if: steps.check.outputs.has_draft == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILENAME="${{ steps.check.outputs.filename }}"
          URL="https://hiboss.demosilvermoon.com.tw/blog/posts/${FILENAME}"
          python3 -c "
          import json, urllib.request
          data = json.dumps({
            'chat_id': '${TG_CHAT}',
            'text': 'Blog auto-publish\n\n${FILENAME}\n${URL}\n\nGoogle indexed'
          }).encode('utf-8')
          req = urllib.request.Request('https://api.telegram.org/bot${TG_TOKEN}/sendMessage', data=data)
          req.add_header('Content-Type', 'application/json; charset=utf-8')
          urllib.request.urlopen(req)
          print('Telegram notified')
          "
